<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580">
  <defs>
    <clipPath id="terminal-clip">
      <rect x="0" y="0" width="820" height="580" rx="12"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <g clip-path="url(#terminal-clip)">
    <!-- Background -->
    <rect width="820" height="580" rx="12" fill="#1e1e2e"/>

    <!-- Title bar -->
    <rect width="820" height="40" fill="#313244"/>

    <!-- Traffic lights -->
    <circle cx="20" cy="20" r="6" fill="#f38ba8"/>
    <circle cx="40" cy="20" r="6" fill="#f9e2af"/>
    <circle cx="60" cy="20" r="6" fill="#a6e3a1"/>

    <!-- Title text -->
    <text x="410" y="25" text-anchor="middle" fill="#6c7086" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace" font-size="13" font-weight="500">Claude Code</text>

    <!-- Terminal content -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace" font-size="13.5">

      <!-- Prompt line -->
      <text x="20" y="72" fill="#89b4fa">❯</text>
      <text x="38" y="72" fill="#cdd6f4">/design Build a pricing page with monthly/annual toggle</text>

      <!-- Blank line -->

      <!-- Plugin header -->
      <text x="20" y="108" fill="#a6adc8">  Design Studio v2.0.0</text>

      <!-- Separator -->
      <text x="20" y="128" fill="#585b70">  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

      <!-- Task analysis -->
      <text x="20" y="158" fill="#f9e2af">  🎯 Task Analysis</text>
      <text x="20" y="178" fill="#a6adc8">  Building:</text><text x="116" y="178" fill="#cdd6f4">Responsive pricing component</text>
      <text x="20" y="198" fill="#a6adc8">  Quality:</text><text x="108" y="198" fill="#cdd6f4">Production-ready</text>
      <text x="20" y="218" fill="#a6adc8">  Audience:</text><text x="116" y="218" fill="#cdd6f4">SaaS visitors, conversion-focused</text>

      <!-- Team assembly -->
      <text x="20" y="254" fill="#f9e2af">  👥 Team Assembled</text>
      <text x="20" y="278" fill="#585b70">  ├─</text><text x="56" y="278" fill="#cba6f7">UI Designer</text><text x="162" y="278" fill="#6c7086"> — Layout, typography, visual hierarchy</text>
      <text x="20" y="298" fill="#585b70">  ├─</text><text x="56" y="298" fill="#f38ba8">Content Designer</text><text x="202" y="298" fill="#6c7086"> — Tier names, feature copy, CTAs</text>
      <text x="20" y="318" fill="#585b70">  ├─</text><text x="56" y="318" fill="#a6e3a1">Motion Designer</text><text x="194" y="318" fill="#6c7086"> — Toggle animation, hover states</text>
      <text x="20" y="338" fill="#585b70">  └─</text><text x="56" y="338" fill="#89b4fa">Design System Lead</text><text x="218" y="338" fill="#6c7086"> — Tokens, spacing, theming</text>

      <!-- Creative direction -->
      <text x="20" y="374" fill="#f9e2af">  🎬 Creative Direction</text>
      <text x="20" y="394" fill="#a6adc8">  Mood:</text><text x="80" y="394" fill="#cdd6f4">Professional, modern, trustworthy</text>

      <!-- Build progress -->
      <text x="20" y="430" fill="#f9e2af">  ⚡ Building</text>
      <text x="20" y="454" fill="#a6e3a1">  ✓</text><text x="42" y="454" fill="#cdd6f4"> 3-tier pricing cards with feature lists</text>
      <text x="20" y="474" fill="#a6e3a1">  ✓</text><text x="42" y="474" fill="#cdd6f4"> Monthly/annual toggle with smooth animation</text>
      <text x="20" y="494" fill="#a6e3a1">  ✓</text><text x="42" y="494" fill="#cdd6f4"> Responsive breakpoints (375px, 768px, 1280px)</text>
      <text x="20" y="514" fill="#a6e3a1">  ✓</text><text x="42" y="514" fill="#cdd6f4"> Dark mode + design tokens</text>

      <!-- Quality review -->
      <text x="20" y="550" fill="#a6e3a1">  ✅ Quality Review PASSED</text>
      <text x="234" y="550" fill="#6c7086">Accessibility: AA ✓  Responsive: ✓  Tokens: ✓</text>

    </g>
  </g>
</svg>
